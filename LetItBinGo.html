<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetItBinGo!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3.5rem;
      margin: 30px 0 10px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 1rem;
      color: #a89fd6;
      margin-bottom: 30px;
      text-align: center;
      padding: 0 20px;
    }

    /* ---- SHARED ---- */
    .screen { display: none; flex-direction: column; align-items: center; width: 90%; max-width: 600px; gap: 16px; }
    .screen.active { display: flex; }
    .screen p { font-size: 1.05rem; color: #c4bef0; text-align: center; }

    input, select {
      padding: 12px 16px;
      border: 2px solid #5a4f9a;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input::placeholder { color: #7a72a8; }
    input:focus, select:focus { border-color: #ffd200; }
    select option { background: #302b63; color: #fff; }

    .input-row { width: 100%; display: flex; gap: 8px; align-items: center; }
    .input-row label { font-weight: 700; min-width: 110px; color: #c4bef0; }
    .input-row input, .input-row select { flex: 1; }

    .btn-primary {
      padding: 14px 40px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 1px;
    }
    .btn-primary:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 4px 20px rgba(118, 75, 162, 0.5); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-gold {
      padding: 12px 20px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-gold:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(255, 210, 0, 0.4); }

    .btn-outline {
      padding: 10px 24px; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px;
      background: rgba(255,255,255,0.06); color: #c4bef0;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-outline:hover { border-color: #ffd200; color: #ffd200; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    /* ---- JOIN / CREATE ---- */
    .home-card {
      background: rgba(255,255,255,0.05); border-radius: 16px; padding: 28px;
      width: 100%; display: flex; flex-direction: column; gap: 14px; align-items: center;
    }
    .home-card h2 { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: #ffd200; }
    .divider { width: 100%; text-align: center; color: #5a4f9a; font-weight: 700; font-size: 1.1rem; margin: 4px 0; }

    /* ---- LOBBY ---- */
    .room-code {
      font-family: 'Fredoka One', cursive; font-size: 2.5rem; letter-spacing: 8px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .player-list { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .player-list-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.06); padding: 10px 16px; border-radius: 10px;
    }
    .player-list-item .player-name { font-weight: 700; }
    .player-list-item .host-badge {
      font-size: 0.75rem; background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e; padding: 2px 8px; border-radius: 6px; font-weight: 700;
    }
    .player-list-item .ready-badge {
      font-size: 0.75rem; background: #2ecc71; color: #1a1a2e;
      padding: 2px 8px; border-radius: 6px; font-weight: 700;
    }
    .player-list-item .offline-badge {
      font-size: 0.75rem; background: #636e72; color: #fff;
      padding: 2px 8px; border-radius: 6px; font-weight: 700;
    }
    .player-list-item.disconnected { opacity: 0.5; }
    .lobby-info { font-size: 0.9rem; color: #a89fd6; text-align: center; }
    .lobby-info strong { color: #ffd200; }

    /* ---- PHRASE ENTRY ---- */
    .phrase-input-area { width: 100%; display: flex; gap: 8px; }
    .phrase-input-area input { flex: 1; }
    .phrase-list { width: 100%; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .phrase-item {
      display: flex; align-items: center; background: rgba(255,255,255,0.06);
      padding: 8px 14px; border-radius: 10px; font-size: 0.95rem;
    }
    .phrase-item span { flex: 1; margin-right: 8px; word-break: break-word; }
    .phrase-number { color: #ffd200; font-weight: 700; margin-right: 10px; min-width: 28px; }
    .remove-btn {
      background: none; border: none; color: #ff6b6b; font-size: 1.2rem;
      cursor: pointer; padding: 0 4px; transition: transform 0.15s;
    }
    .remove-btn:hover { transform: scale(1.3); }
    .counter { font-size: 0.95rem; color: #a89fd6; }
    .counter strong { color: #ffd200; }
    .waiting-msg { color: #a89fd6; font-style: italic; }

    /* ---- GAME ---- */
    .bingo-header { display: grid; width: 100%; margin-bottom: 4px; }
    .bingo-header div {
      text-align: center; font-family: 'Fredoka One', cursive; font-size: 2rem; padding: 8px 0;
    }
    .header-colors div:nth-child(1) { color: #ff6b6b; }
    .header-colors div:nth-child(2) { color: #ffd200; }
    .header-colors div:nth-child(3) { color: #48dbfb; }
    .header-colors div:nth-child(4) { color: #0abde3; }
    .header-colors div:nth-child(5) { color: #ff9ff3; }
    .header-colors div:nth-child(6) { color: #ff6b6b; }
    .header-colors div:nth-child(7) { color: #ffd200; }

    .bingo-grid { display: grid; gap: 5px; width: 100%; max-width: 560px; }

    .bingo-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 6px; border-radius: 12px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1);
      font-size: 0.78rem; line-height: 1.2; cursor: pointer; transition: all 0.2s;
      word-break: break-word; overflow: hidden; user-select: none;
    }
    .bingo-cell:hover:not(.stamped):not(.free) { border-color: #ffd200; background: rgba(255,210,0,0.1); }
    .bingo-cell.stamped {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e; font-weight: 700; border-color: #ffd200;
      box-shadow: 0 0 12px rgba(255,210,0,0.3);
    }
    .bingo-cell.free {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Fredoka One', cursive; font-size: 0.9rem;
      border-color: #764ba2; box-shadow: 0 0 12px rgba(118,75,162,0.4); cursor: default;
    }
    .bingo-cell.win-cell { animation: winPulse 0.6s ease-in-out infinite alternate; }

    @keyframes winPulse {
      from { box-shadow: 0 0 8px rgba(255,210,0,0.4); }
      to   { box-shadow: 0 0 25px rgba(255,210,0,0.9); }
    }

    #win-banner {
      display: none; margin: 16px 0; padding: 16px 36px; border-radius: 16px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e; font-family: 'Fredoka One', cursive; font-size: 1.8rem;
      text-align: center; animation: bannerPop 0.4s ease-out;
    }
    @keyframes bannerPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* ---- ERROR TOAST ---- */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #ff6b6b; color: #fff; padding: 12px 24px; border-radius: 12px;
      font-weight: 700; font-size: 0.95rem; z-index: 2000;
      animation: toastIn 0.3s ease-out;
      display: none;
    }
    .toast.visible { display: block; }
    @keyframes toastIn { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* ---- CONFETTI ---- */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; top: -20px; opacity: 0;
      animation: confettiFall linear forwards; pointer-events: none; z-index: 1000;
    }
    @keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }

    /* Scrollbar */
    .phrase-list::-webkit-scrollbar { width: 6px; }
    .phrase-list::-webkit-scrollbar-track { background: transparent; }
    .phrase-list::-webkit-scrollbar-thumb { background: #5a4f9a; border-radius: 3px; }
  </style>
</head>
<body>

  <h1>LetItBinGo!</h1>
  <p class="subtitle">Real-life event Bingo — submit your predictions, then mark them as they happen!</p>

  <!-- SCREEN 1: HOME — Create or Join -->
  <div id="home-screen" class="screen active">
    <div class="home-card">
      <h2>Create a Game</h2>
      <input type="text" id="create-name" placeholder="Your name" maxlength="20">
      <button class="btn-primary" onclick="createRoom()">Create Room</button>
    </div>
    <div class="divider">— or —</div>
    <div class="home-card">
      <h2>Join a Game</h2>
      <input type="text" id="join-name" placeholder="Your name" maxlength="20">
      <input type="text" id="join-code" placeholder="Room code (e.g. AB3K)" maxlength="4" style="text-transform:uppercase; text-align:center; font-family:'Fredoka One',cursive; font-size:1.4rem; letter-spacing:6px;">
      <button class="btn-primary" onclick="joinRoom()">Join</button>
    </div>
  </div>

  <!-- SCREEN 2: LOBBY -->
  <div id="lobby-screen" class="screen">
    <p>Room Code</p>
    <div class="room-code" id="room-code"></div>
    <p style="font-size:0.85rem; color:#7a72a8;">Share this code with your friends!</p>

    <div class="input-row" id="board-size-row">
      <label for="board-size">Board Size</label>
      <select id="board-size" onchange="changeBoardSize()">
        <option value="3">3 x 3</option>
        <option value="4">4 x 4</option>
        <option value="5" selected>5 x 5</option>
        <option value="6">6 x 6</option>
        <option value="7">7 x 7</option>
      </select>
    </div>

    <div class="lobby-info" id="lobby-info"></div>
    <div class="player-list" id="player-list"></div>
    <button class="btn-primary" id="start-btn" onclick="startPhrases()" style="display:none;">Start Game</button>
    <p class="waiting-msg" id="lobby-wait" style="display:none;">Waiting for host to start...</p>
  </div>

  <!-- SCREEN 3: PHRASE ENTRY -->
  <div id="phrase-screen" class="screen">
    <p id="phrase-prompt"></p>
    <div class="phrase-input-area">
      <input type="text" id="phrase-input" placeholder="e.g. Someone spills coffee" maxlength="80">
      <button class="btn-gold" onclick="addPhrase()">Add</button>
    </div>
    <div class="counter"><strong id="count">0</strong> / <span id="max-count">5</span> phrases</div>
    <div class="phrase-list" id="phrase-list"></div>
    <button class="btn-primary" id="submit-phrases-btn" onclick="submitPhrases()" disabled>Submit Phrases</button>
    <p class="waiting-msg" id="phrase-wait" style="display:none;">Waiting for other players...</p>

    <div class="player-list" id="phrase-player-list" style="margin-top:10px;"></div>
  </div>

  <!-- SCREEN 4: GAME -->
  <div id="game-screen" class="screen" style="max-width:700px;">
    <div class="bingo-header header-colors" id="bingo-header"></div>
    <div class="bingo-grid" id="bingo-grid"></div>
    <div id="win-banner"></div>
    <div class="btn-row" style="margin-top:16px;">
      <button class="btn-outline" onclick="leaveGame()">Leave Game</button>
    </div>
  </div>

  <!-- ERROR TOAST -->
  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // ---- LOCAL STATE ----
    let myId = null;
    let isHost = false;
    let roomCode = null;
    let roomState = null;
    let myPhrasesNeeded = 0;
    let currentPhrases = [];
    let phrasesSubmitted = false;

    // Game state
    let myCard = [];
    let myStamped = [];
    let boardSize = 5;
    let myWon = false;
    let myWinLine = null;

    // ---- SCREENS ----
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ---- HOME ----
    function createRoom() {
      const name = document.getElementById('create-name').value.trim();
      if (!name) return showToast('Enter your name.');
      socket.emit('create-room', { playerName: name, boardSize: 5 });
    }

    function joinRoom() {
      const name = document.getElementById('join-name').value.trim();
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      if (!name) return showToast('Enter your name.');
      if (!code || code.length !== 4) return showToast('Enter a 4-character room code.');
      socket.emit('join-room', { code, playerName: name });
    }

    // Enter key support
    document.getElementById('create-name').addEventListener('keydown', e => { if (e.key === 'Enter') createRoom(); });
    document.getElementById('join-code').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
    document.getElementById('join-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('join-code').focus();
    });

    // ---- SOCKET EVENTS ----
    socket.on('room-joined', ({ code, playerId, isHost: host }) => {
      myId = playerId;
      isHost = host;
      roomCode = code;
      document.getElementById('room-code').textContent = code;
      showScreen('lobby-screen');
    });

    socket.on('room-update', (state) => {
      roomState = state;

      if (state.phase === 'lobby') {
        renderLobby(state);
      } else if (state.phase === 'phrases') {
        if (!phrasesSubmitted) {
          // Find my phrase count
          const me = state.players.find(p => p.id === myId);
          if (me) {
            myPhrasesNeeded = me.phrasesNeeded;
            if (document.getElementById('phrase-screen').classList.contains('active')) {
              // Already on phrase screen, just update player list
              renderPhrasePlayerList(state);
            } else {
              showPhraseScreen();
            }
          }
        } else {
          renderPhrasePlayerList(state);
        }
      } else if (state.phase === 'game') {
        // game-start event handles the transition
      }
    });

    socket.on('game-start', ({ card, stamped, boardSize: bs }) => {
      myCard = card;
      myStamped = stamped;
      boardSize = bs;
      myWon = false;
      myWinLine = null;
      showScreen('game-screen');
      renderGame();
    });

    socket.on('stamp-update', ({ stamped, won, winLine }) => {
      myStamped = stamped;
      myWon = won;
      myWinLine = winLine;
      renderGame();
    });

    socket.on('player-won', ({ playerId, playerName, winLine }) => {
      if (playerId === myId) {
        document.getElementById('win-banner').textContent = 'YOU GOT BINGO!';
        document.getElementById('win-banner').style.display = 'block';
        launchConfetti();
      } else {
        showToast(`${playerName} got BINGO!`);
      }
    });

    socket.on('error-msg', (msg) => {
      showToast(msg);
    });

    // ---- LOBBY ----
    function renderLobby(state) {
      const list = document.getElementById('player-list');
      list.innerHTML = state.players.map(p => `
        <div class="player-list-item${p.connected ? '' : ' disconnected'}">
          <span class="player-name">${escapeHtml(p.name)}${p.id === myId ? ' (you)' : ''}</span>
          <span>
            ${p.id === state.hostId ? '<span class="host-badge">HOST</span> ' : ''}
            ${!p.connected ? '<span class="offline-badge">OFFLINE</span>' : ''}
          </span>
        </div>
      `).join('');

      // Board size control only for host
      document.getElementById('board-size-row').style.display = isHost ? 'flex' : 'none';
      document.getElementById('board-size').value = state.boardSize;

      // Info
      const totalCells = state.boardSize * state.boardSize - 1;
      const n = state.players.length;
      const base = Math.floor(totalCells / n);
      const rem = totalCells % n;
      const distribution = rem > 0
        ? `${rem} player${rem > 1 ? 's' : ''} submit <strong>${base + 1}</strong>, rest submit <strong>${base}</strong>`
        : `<strong>${base}</strong> phrases each`;
      document.getElementById('lobby-info').innerHTML = `
        <strong>${state.boardSize} x ${state.boardSize}</strong> board &mdash; <strong>${totalCells}</strong> phrases needed<br>${distribution}
      `;

      // Host controls
      document.getElementById('start-btn').style.display = isHost ? 'inline-block' : 'none';
      document.getElementById('start-btn').disabled = state.players.length < 2;
      document.getElementById('lobby-wait').style.display = isHost ? 'none' : 'block';
    }

    function changeBoardSize() {
      const size = parseInt(document.getElementById('board-size').value);
      socket.emit('update-board-size', size);
    }

    function startPhrases() {
      socket.emit('start-phrases');
    }

    // ---- PHRASE ENTRY ----
    function showPhraseScreen() {
      currentPhrases = [];
      phrasesSubmitted = false;
      document.getElementById('phrase-prompt').textContent = `Enter ${myPhrasesNeeded} event${myPhrasesNeeded > 1 ? 's' : ''} or prediction${myPhrasesNeeded > 1 ? 's' : ''}:`;
      document.getElementById('max-count').textContent = myPhrasesNeeded;
      document.getElementById('submit-phrases-btn').disabled = true;
      document.getElementById('submit-phrases-btn').style.display = 'inline-block';
      document.getElementById('phrase-wait').style.display = 'none';
      document.getElementById('phrase-input').value = '';
      renderPhraseList();
      showScreen('phrase-screen');
      document.getElementById('phrase-input').focus();
      if (roomState) renderPhrasePlayerList(roomState);
    }

    const phraseInput = document.getElementById('phrase-input');
    phraseInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPhrase(); });

    function addPhrase() {
      const text = phraseInput.value.trim();
      if (!text || currentPhrases.length >= myPhrasesNeeded) return;
      if (currentPhrases.includes(text)) { phraseInput.select(); return; }
      currentPhrases.push(text);
      phraseInput.value = '';
      phraseInput.focus();
      renderPhraseList();
    }

    function removePhrase(index) {
      currentPhrases.splice(index, 1);
      renderPhraseList();
    }

    function renderPhraseList() {
      const list = document.getElementById('phrase-list');
      list.innerHTML = currentPhrases.map((p, i) => `
        <div class="phrase-item">
          <span class="phrase-number">${i + 1}.</span>
          <span>${escapeHtml(p)}</span>
          <button class="remove-btn" onclick="removePhrase(${i})">&times;</button>
        </div>
      `).join('');
      document.getElementById('count').textContent = currentPhrases.length;
      document.getElementById('submit-phrases-btn').disabled = currentPhrases.length < myPhrasesNeeded;
    }

    function renderPhrasePlayerList(state) {
      const list = document.getElementById('phrase-player-list');
      list.innerHTML = state.players.map(p => `
        <div class="player-list-item${p.connected ? '' : ' disconnected'}">
          <span class="player-name">${escapeHtml(p.name)}${p.id === myId ? ' (you)' : ''}</span>
          ${!p.connected ? '<span class="offline-badge">OFFLINE</span>' : p.ready ? '<span class="ready-badge">READY</span>' : '<span style="color:#7a72a8;font-size:0.85rem;">typing...</span>'}
        </div>
      `).join('');
    }

    function submitPhrases() {
      if (currentPhrases.length < myPhrasesNeeded) return;
      socket.emit('submit-phrases', currentPhrases);
      phrasesSubmitted = true;
      document.getElementById('submit-phrases-btn').style.display = 'none';
      document.getElementById('phrase-input').disabled = true;
      document.getElementById('phrase-wait').style.display = 'block';
      // Disable remove buttons
      document.querySelectorAll('.remove-btn').forEach(b => b.style.display = 'none');
    }

    // ---- GAME ----
    function renderGame() {
      const headerLetters = 'BINGO'.repeat(Math.ceil(boardSize / 5)).slice(0, boardSize);
      const header = document.getElementById('bingo-header');
      header.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
      header.innerHTML = headerLetters.split('').map(l => `<div>${l}</div>`).join('');

      const grid = document.getElementById('bingo-grid');
      grid.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
      const freeIndex = Math.floor((boardSize * boardSize) / 2);

      grid.innerHTML = myCard.map((phrase, i) => {
        const classes = ['bingo-cell'];
        if (i === freeIndex) classes.push('free');
        if (myStamped[i]) classes.push('stamped');
        if (myWon && myWinLine && myWinLine.includes(i)) classes.push('win-cell');
        return `<div class="${classes.join(' ')}" onclick="stampCell(${i})">${escapeHtml(phrase)}</div>`;
      }).join('');

      if (myWon) {
        document.getElementById('win-banner').textContent = 'YOU GOT BINGO!';
        document.getElementById('win-banner').style.display = 'block';
      }
    }

    function stampCell(index) {
      const freeIndex = Math.floor((boardSize * boardSize) / 2);
      if (index === freeIndex || myWon) return;
      socket.emit('stamp-cell', index);
    }

    function leaveGame() {
      location.reload();
    }

    // ---- UTILS ----
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('visible'), 3000);
    }

    function launchConfetti() {
      const colors = ['#ff6b6b','#ffd200','#48dbfb','#ff9ff3','#0abde3','#f7971e','#764ba2'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        piece.style.animationDelay = (Math.random() * 0.8) + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }
  </script>
</body>
</html>
